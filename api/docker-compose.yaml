services:
  mysql:
    image: mysql:8.0
    container_name: techfinance-mysql
    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techfinance
      MYSQL_USER: techfinance
      MYSQL_PASSWORD: techfinance123

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - techfinance-network

volumes:
  mysql_data:

networks:
  techfinance-network:
    driver: bridge